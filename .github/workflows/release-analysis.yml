name: release-analysis

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-ana*"

permissions:
  contents: write

jobs:
  release_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Build analysis artifacts
        run: |
          python tools/build_analysis.py --work yellow_wallpaper
          python tools/write_analysis_sha256.py

      - name: List artifacts
        run: |
          ls -la analysis/results
          cat analysis/results/analysis.sha256

      - name: Create GitHub Release (analysis)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            analysis/results/window_metrics.csv
            analysis/results/keyness_last_vs_first.csv
            analysis/results/analysis.sha256
